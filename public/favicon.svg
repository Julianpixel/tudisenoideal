<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fondo Negro -->
  <circle cx="50" cy="50" r="48" fill="#000000" />
  
  <!-- Anillo Dorado -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="url(#goldGrad)" stroke-width="2" />
  
  <!-- Letras SS (Grandes y Estilizadas) -->
  <text x="49" y="70" font-family="'Playfair Display', serif, 'Times New Roman'" font-size="56" font-weight="900" font-style="italic" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="-2">SS</text>
  
  <!-- Detalle floral blanco simple inspirado en la orquídea al lado derecho -->
  <g transform="translate(68, 20) scale(0.9)">
    <path d="M 0 10 Q 10 0 15 10 Q 5 20 0 10 Z" fill="#ffffff" opacity="0.9" />
    <path d="M 5 15 Q 15 5 20 15 Q 10 25 5 15 Z" fill="#ffffff" opacity="0.7" />
    <circle cx="12" cy="12" r="2" fill="url(#goldGrad)" />
  </g>

  <!-- Máscara negra central para el subtexto (tipo listón oscuro) -->
  <rect x="10" y="44" width="80" height="15" fill="#000000" />
  
  <!-- Texto secundario: Tu Diseño Ideal -->
  <text x="50" y="55" font-family="'Brush Script MT', cursive, serif" font-size="11" fill="url(#goldGrad)" text-anchor="middle" font-style="italic">Tu Diseño ideal.</text>
  
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCE196" />
      <stop offset="25%" stop-color="#D4AF37" />
      <stop offset="50%" stop-color="#997A15" />
      <stop offset="75%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#FCE196" />
    </linearGradient>
  </defs>
</svg>
