backend:
  name: github
  repo: "Julianpixel/tudisenoideal"
  branch: main
  # Sveltia will automatically handle authentication using a generic proxy

site_url: "https://tudisenoideal.vercel.app"
display_url: "https://tudisenoideal.vercel.app"

locale: "es"

media_folder: "public/uploads"
public_folder: "/uploads"

logo_url: "/favicon.svg"

collections:
  - name: "pages"
    label: "Páginas y Textos"
    files:
      - label: "Configuración General"
        name: "settings"
        file: "src/data/settings.json"
        fields:
          - { label: "Etiqueta Hero", name: "heroTag", widget: "string" }
          - { label: "Título Principal Hero", name: "heroTitle", widget: "string" }
          - { label: "Subtítulo Hero", name: "heroSubtitle", widget: "string" }
          - { label: "Imagen Hero", name: "heroImage", widget: "image" }
          - { label: "Título Sobre Nosotros", name: "aboutTitle", widget: "string" }
          - { label: "Texto Sobre Nosotros", name: "aboutText", widget: "text" }
          - { label: "Email de Contacto", name: "contactEmail", widget: "string" }
          - { label: "Teléfono (WhatsApp Ej: 18091234567)", name: "contactPhoneUrl", widget: "string" }
          - { label: "Logo del Footer", name: "footerLogo", widget: "image", required: false }
          - { label: "Descripción corta del Footer", name: "footerDescription", widget: "string", required: false }
          - { label: "Texto Footer / Derechos", name: "footerCopyright", widget: "string" }

      - label: "Administrador de Galería"
        name: "gallery_manager"
        file: "src/data/gallery.json"
        description: "El máximo de imágenes permitidas en la web es de 50. Para añadir nuevas si llegas a 50, deberás borrar una imagen aquí primero."
        fields:
          - label: "Proyectos en Galería"
            name: "items"
            widget: "list"
            max: 50
            fields:
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Categoría", name: "category", widget: "select", options: ["globos", "resina", "letreros", "styrofoam", "eventos", "otros"] }
              - { label: "Fotografía", name: "image", widget: "image" }
